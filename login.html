<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Đăng nhập quản trị</title>
<style>
:root{
  --bg:#f5f7fb;
  --card:#111827;
  --accent:#2563eb;
  --accent2:#60a5fa;
  --txt:#e5eefc;
  --muted:#9ca3af;
  --danger:#ef4444;
  --ok:#22c55e;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:Arial,Helvetica,sans-serif;
  background:radial-gradient(900px 400px at 20% -10%,rgba(37,99,235,.18),transparent),linear-gradient(180deg,#eef4ff 0%,#f5f7fb 100%);
  padding:20px;
}
.card{
  width:100%;
  max-width:420px;
  background:#111827;
  color:var(--txt);
  border-radius:22px;
  padding:28px;
  box-shadow:0 25px 70px rgba(2,6,23,.35);
}
.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 12px;
  border-radius:999px;
  background:rgba(96,165,250,.12);
  border:1px solid rgba(96,165,250,.28);
  color:#bfdbfe;
  font-size:13px;
  font-weight:700;
}
h1{margin:14px 0 6px;font-size:28px}
p{margin:0;color:var(--muted);line-height:1.5}
label{display:block;margin:16px 0 8px;font-weight:700;color:#dbeafe}
input{
  width:100%;
  padding:13px 14px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.12);
  background:#0b1220;
  color:#fff;
  font-size:15px;
  outline:none;
}
input:focus{border-color:rgba(96,165,250,.8); box-shadow:0 0 0 3px rgba(37,99,235,.18)}
button{
  width:100%;
  margin-top:18px;
  border:none;
  border-radius:14px;
  padding:14px 16px;
  font-size:15px;
  font-weight:800;
  color:#fff;
  cursor:pointer;
  background:linear-gradient(180deg,var(--accent2),var(--accent));
  box-shadow:0 14px 30px rgba(37,99,235,.30);
}
button:hover{filter:brightness(1.03)}
.note,.hint{font-size:13px;color:var(--muted)}
.note{margin-top:14px;line-height:1.6}
.hint{margin-top:10px}
.error{min-height:22px;margin-top:12px;color:#fda4af;font-size:14px;font-weight:700}
.ok{color:#86efac}
.footer{margin-top:18px;padding-top:14px;border-top:1px solid rgba(255,255,255,.08);font-size:12px;color:var(--muted)}
code{background:rgba(255,255,255,.08);padding:2px 6px;border-radius:6px;color:#fff}
</style>
</head>
<body>
  <div class="card">
    <div class="badge">🔐 Khu vực quản trị</div>
    <center><h1>Đăng nhập</h1></center>
    

    <form id="loginForm" autocomplete="off">
      <label for="username">Tài khoản</label>
      <input id="username" name="username" placeholder="Nhập tài khoản" required autofocus />

      <label for="password">Mật khẩu</label>
      <input id="password" name="password" type="password" placeholder="Nhập mật khẩu" required />

      <button type="submit">Đăng nhập hệ thống</button>
      <div id="msg" class="error"></div>
    </form>

    <div class="note">
    </div>
    <div class="footer"> Liên hệ: Vũ Việt Tùng; 0982.959.361</code>.</div>
  </div>

<script>
(function(){
  const AUTH_KEY = 'vtf_admin_logged_in';
  const USER_KEY = 'vtf_admin_user';
  const AUTH_CONFIG = {
    username: 'admin',
    password: 'admin123'
  };

  const form = document.getElementById('loginForm');
  const msg = document.getElementById('msg');
  const nextParam = new URLSearchParams(window.location.search).get('next');
  const nextPage = nextParam && /^[a-zA-Z0-9_\-.]+\.html$/.test(nextParam) ? nextParam : 'index.html';

  if (sessionStorage.getItem(AUTH_KEY) === '1') {
    window.location.replace(nextPage);
  }

  form.addEventListener('submit', function(e){
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (username === AUTH_CONFIG.username && password === AUTH_CONFIG.password) {
      sessionStorage.setItem(AUTH_KEY, '1');
      sessionStorage.setItem(USER_KEY, username);
      msg.textContent = 'Đăng nhập thành công, đang chuyển trang...';
      msg.classList.add('ok');
      window.location.replace(nextPage);
      return;
    }

    msg.textContent = 'Sai tài khoản hoặc mật khẩu.';
    msg.classList.remove('ok');
  });
})();
</script>
</body>
</html>
