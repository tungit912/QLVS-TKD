<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Đăng nhập quản trị</title>
<style>
:root{
  --bg:#f5f7fb;
  --card:#111827;
  --card2:#0b1220;
  --accent:#2563eb;
  --accent2:#60a5fa;
  --txt:#e5eefc;
  --muted:#9ca3af;
  --danger:#ef4444;
  --ok:#22c55e;
  --line:rgba(255,255,255,.12);
}
.qr-box{
  position: fixed;
  bottom: 15px;
  right: 15px;
  width: 90px;
  height: 90px;
  z-index: 9999;
  opacity: 0.9;
  transition: 0.3s;
}

.qr-box img{
  width: 100%;
  height: 100%;
  border-radius: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.qr-box:hover{
  transform: scale(1.1);
  opacity: 1;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:Arial,Helvetica,sans-serif;
  background:
    radial-gradient(900px 400px at 20% -10%,rgba(37,99,235,.18),transparent),
    linear-gradient(180deg,#eef4ff 0%,#f5f7fb 100%);
  padding:20px;
}
.card{
  width:100%;
  max-width:460px;
  background:var(--card);
  color:var(--txt);
  border-radius:22px;
  padding:28px;
  box-shadow:0 25px 70px rgba(2,6,23,.35);
}
.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 12px;
  border-radius:999px;
  background:rgba(96,165,250,.12);
  border:1px solid rgba(96,165,250,.28);
  color:#bfdbfe;
  font-size:13px;
  font-weight:700;
}
h1{margin:14px 0 6px;font-size:28px;text-align:center}
p{margin:0;color:var(--muted);line-height:1.5}
.sub{text-align:center;margin-bottom:4px}
label{display:block;margin:16px 0 8px;font-weight:700;color:#dbeafe}
input{
  width:100%;
  padding:13px 14px;
  border-radius:12px;
  border:1px solid var(--line);
  background:var(--card2);
  color:#fff;
  font-size:15px;
  outline:none;
}
input:focus{border-color:rgba(96,165,250,.8); box-shadow:0 0 0 3px rgba(37,99,235,.18)}
button{
  width:100%;
  margin-top:18px;
  border:none;
  border-radius:14px;
  padding:14px 16px;
  font-size:15px;
  font-weight:800;
  color:#fff;
  cursor:pointer;
  background:linear-gradient(180deg,var(--accent2),var(--accent));
  box-shadow:0 14px 30px rgba(37,99,235,.30);
}
button:hover{filter:brightness(1.03)}
.secondary{
  background:linear-gradient(180deg,#334155,#1f2937);
  box-shadow:0 14px 30px rgba(15,23,42,.35);
}
.panel{
  margin-top:18px;
  padding:16px;
  border:1px solid var(--line);
  border-radius:16px;
  background:rgba(255,255,255,.04);
  display:none;
}
.panel.show{display:block}
.note,.hint{font-size:13px;color:var(--muted)}
.note{margin-top:14px;line-height:1.6}
.hint{margin-top:10px}
.error{min-height:22px;margin-top:12px;color:#fda4af;font-size:14px;font-weight:700}
.ok{color:#86efac}
.footer{margin-top:18px;padding-top:14px;border-top:1px solid rgba(255,255,255,.08);font-size:12px;color:var(--muted)}
.smallbtn{margin-top:12px;padding:12px 14px;font-size:14px}
.row{display:flex;gap:10px;flex-wrap:wrap}
.row > button{flex:1}

</style>
</head>
<body>
  <div class="card">
    <div class="badge">🔐 Khu vực quản trị</div>
    <h1>Đăng nhập</h1>
    <p class="sub">Vui lòng nhập tài khoản quản trị để tiếp tục.</p>

    <form id="loginForm" autocomplete="off">
      <label for="username">Tài khoản</label>
      <input id="username" name="username" placeholder="Nhập tài khoản" required autofocus />

      <label for="password">Mật khẩu</label>
      <input id="password" name="password" type="password" placeholder="Nhập mật khẩu" required />

      <button type="submit">Đăng nhập hệ thống</button>
      <button type="button" class="secondary smallbtn" id="toggleChangeBtn">🔑 Thay đổi mật khẩu</button>
      <div id="msg" class="error"></div>
    </form>

    <div id="changePanel" class="panel">
      <label for="oldPass">Mật khẩu cũ</label>
      <input id="oldPass" type="password" placeholder="Nhập mật khẩu cũ" />

      <label for="newPass">Mật khẩu mới</label>
      <input id="newPass" type="password" placeholder="Nhập mật khẩu mới" />

      <label for="confirmPass">Xác nhận mật khẩu mới</label>
      <input id="confirmPass" type="password" placeholder="Nhập lại mật khẩu mới" />

      <div class="row">
        <button type="button" id="savePassBtn">✅ Xác nhận đổi mật khẩu</button>
        <button type="button" class="secondary" id="cancelPassBtn">Đóng</button>
      </div>
      <div id="changeMsg" class="error"></div>
      <div class="hint">Mật khẩu mới nên có ít nhất 4 ký tự. Tài khoản mặc định ban đầu: <b>admin</b>.</div>
    </div>
	<div class="qr-box">
	<img src="qr.jpg" alt="QR chuyển khoản">
	</div>
    <div class="footer">Liên hệ: Vũ Việt Tùng; 0982.959.361</div>
  </div>

<script>
(function(){
  const AUTH_KEY = 'vtf_admin_logged_in';
  const USER_KEY = 'vtf_admin_user';
  const PASS_KEY = 'vtf_admin_pass';
  const NAME_KEY = 'vtf_admin_name';
  const DEFAULT_USER = 'admin';
  const DEFAULT_PASS = 'admin123';

  const form = document.getElementById('loginForm');
  const msg = document.getElementById('msg');
  const changeMsg = document.getElementById('changeMsg');
  const changePanel = document.getElementById('changePanel');
  const toggleChangeBtn = document.getElementById('toggleChangeBtn');
  const cancelPassBtn = document.getElementById('cancelPassBtn');
  const savePassBtn = document.getElementById('savePassBtn');

  const nextParam = new URLSearchParams(window.location.search).get('next');
  const nextPage = nextParam && /^[a-zA-Z0-9_\-.]+\.html$/.test(nextParam) ? nextParam : 'index.html';

  let savedUser = localStorage.getItem(NAME_KEY) || DEFAULT_USER;
  let savedPass = localStorage.getItem(PASS_KEY) || DEFAULT_PASS;

  function setMessage(el, text, ok){
    el.textContent = text || '';
    if(ok){
      el.classList.add('ok');
    }else{
      el.classList.remove('ok');
    }
  }

  function clearChangeFields(){
    document.getElementById('oldPass').value = '';
    document.getElementById('newPass').value = '';
    document.getElementById('confirmPass').value = '';
    setMessage(changeMsg, '', false);
  }

  function toggleChangePanel(forceOpen){
    const shouldOpen = typeof forceOpen === 'boolean' ? forceOpen : !changePanel.classList.contains('show');
    changePanel.classList.toggle('show', shouldOpen);
    if(!shouldOpen) clearChangeFields();
  }

  if (sessionStorage.getItem(AUTH_KEY) === '1') {
    window.location.replace(nextPage);
  }

  form.addEventListener('submit', function(e){
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (username === savedUser && password === savedPass) {
      sessionStorage.setItem(AUTH_KEY, '1');
      sessionStorage.setItem(USER_KEY, username);
      setMessage(msg, 'Đăng nhập thành công, đang chuyển trang...', true);
      window.location.replace(nextPage);
      return;
    }

    setMessage(msg, 'Sai tài khoản hoặc mật khẩu.', false);
  });

  toggleChangeBtn.addEventListener('click', function(){
    toggleChangePanel();
  });

  cancelPassBtn.addEventListener('click', function(){
    toggleChangePanel(false);
  });

  savePassBtn.addEventListener('click', function(){
    const oldPass = document.getElementById('oldPass').value;
    const newPass = document.getElementById('newPass').value;
    const confirmPass = document.getElementById('confirmPass').value;

    if(oldPass !== savedPass){
      setMessage(changeMsg, 'Sai mật khẩu cũ.', false);
      return;
    }

    if(newPass.trim().length < 4){
      setMessage(changeMsg, 'Mật khẩu mới phải có ít nhất 4 ký tự.', false);
      return;
    }

    if(newPass !== confirmPass){
      setMessage(changeMsg, 'Xác nhận mật khẩu mới chưa khớp.', false);
      return;
    }

    if(newPass === savedPass){
      setMessage(changeMsg, 'Mật khẩu mới đang trùng với mật khẩu hiện tại.', false);
      return;
    }

    localStorage.setItem(PASS_KEY, newPass);
    localStorage.setItem(NAME_KEY, savedUser);
    savedPass = newPass;

    setMessage(changeMsg, 'Đổi mật khẩu thành công.', true);
    setTimeout(function(){
      toggleChangePanel(false);
      setMessage(msg, 'Mật khẩu đã được cập nhật. Bạn có thể đăng nhập ngay.', true);
    }, 800);
  });
})();
</script>
<script>
// ❌ Chặn chuột phải
document.addEventListener("contextmenu", function(e) {
    e.preventDefault();
});

// ❌ Chặn phím F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U
document.addEventListener("keydown", function(e) {
    if (
        e.key === "F12" ||
        (e.ctrlKey && e.shiftKey && ["I", "J", "C"].includes(e.key)) ||
        (e.ctrlKey && e.key === "U")
    ) {
        e.preventDefault();
    }
});

// ❌ Chặn mở DevTools bằng cách phát hiện resize
let devtoolsOpen = false;
setInterval(() => {
    const widthThreshold = window.outerWidth - window.innerWidth > 160;
    const heightThreshold = window.outerHeight - window.innerHeight > 160;

    if (widthThreshold || heightThreshold) {
        if (!devtoolsOpen) {
            devtoolsOpen = true;
            document.body.innerHTML = "<h2 style='color:red;text-align:center'>⚠️ Truy cập bị chặn!</h2>";
        }
    } else {
        devtoolsOpen = false;
    }
}, 1000);
</script>
</body>
</html>
